name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  package:
    name: Package JAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build JAR and sources
        run: mvn -B -ntp -DskipTests package

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: assinafy-sdk-jars
          path: |
            target/*.jar
          if-no-files-found: error

  publish:
    name: Publish release artifact
    needs: [test, package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Configure Maven settings
        env:
          DEPLOY_TOKEN: ${{ secrets.MAVEN_DEPLOY_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>release-registry</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Deploy-Token</name>
                      <value>${env.DEPLOY_TOKEN}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy artifact
        env:
          MAVEN_DEPLOY_URL: ${{ secrets.MAVEN_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.MAVEN_DEPLOY_TOKEN }}
        run: |
          if [ -z "$MAVEN_DEPLOY_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::Maven deploy secrets not configured; skipping publish."
            exit 0
          fi
          mvn -B -ntp -DskipTests deploy \
            -DaltDeploymentRepository=release-registry::default::${MAVEN_DEPLOY_URL}
